<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registro</title>
    <style>

body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

label{
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

input{
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #476796;
}

button{
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    background-color: #4c87af;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

</style>
</head>
<body>

    <form action="/registro_estudiante" method="POST">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" required>

        <label for="carrera">Carrera:</label>
        <input type="text" id="carrera" name="carrera" required>

        <label for="nota1">Nota 1:</label>
        <input type="number" id="nota1" name="nota1" required>

        <label for="nota2">Nota 2:</label>
        <input type="number" id="nota2" name="nota2"  required>

        <label for="nota3">Nota 3:</label>
        <input type="number" id="nota3" name="nota3" required>

        <button type ="submit">Registrar</button>
    </form>

</body>
</html>

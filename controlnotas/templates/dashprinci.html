<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .header {
            background-color: #1E1BD2;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-logout {
            background: red;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            white-space: nowrap;
        }

        .btn-logout:hover {
            background: #cc0000;
        }

        iframe {
            flex: 1;        
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-info">
            <h2>Dashboard</h2>
            <span><b>Usuario:</b> {{usuario}}</span>
        </div>

        <div class="header-buttons">
            <a href="/registro_estudiante" class="btn btn-registrar">Registrar estudiante</a>
            <a href="/logout" class="btn btn-logout">Cerrar sesión</a>
            <a href="/cargamasiva" class="btn btn-registrar">carga masiva</a>
        </div>
    </div>

    <iframe src="/dashprincipal/"></iframe>

</body>
</html>
